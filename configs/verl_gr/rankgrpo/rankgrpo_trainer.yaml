# Minimal Rank-GRPO config for verl release/v0.7.1.
# Composes from upstream PPO trainer config and keeps rollout on vanilla vLLM.

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 2048
  prompt_key: prompt
  shuffle: false
  max_response_length: 1024
  filter_overlong_prompts: true
  filter_overlong_prompts_workers: 16
  truncation: error
  custom_cls:
    name: RankGRPODataset
  reward_fn_key: source
  data_source_key: source
  rankgrpo:
    rec_num: 20
    use_chat_template: true
    add_generation_prompt: true
    use_processor: false
    rank_separator: "\n"
    force_pad_to_eos: true

custom_reward_function:
  name: compute_score

actor_rollout_ref:
  hybrid_engine: true

  ref:
    entropy_from_logits_with_chunking: true
    fsdp_config:
      wrap_policy:
        transformer_layer_cls_to_wrap:
          - Qwen2DecoderLayer
      model_dtype: bfloat16
    profiler:
      enable: ${oc.select:actor_rollout_ref.actor.profiler.enable,false}
      all_ranks: ${oc.select:actor_rollout_ref.actor.profiler.all_ranks,false}
      ranks: ${oc.select:actor_rollout_ref.actor.profiler.ranks,[]}

  actor:
    entropy_checkpointing: true
    clip_ratio_high: 0.08
    use_dynamic_bsz: true
    ppo_mini_batch_size: 8
    ppo_max_token_len_per_gpu: 40960
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    optim:
      lr: 1e-6
      lr_warmup_steps: 10
      weight_decay: 0.1
    fsdp_config:
      wrap_policy:
        transformer_layer_cls_to_wrap:
          - Qwen2DecoderLayer
      model_dtype: bfloat16
    profiler:
      enable: false
      all_ranks: false
      ranks: [0]

  rollout:
    name: vllm
    n: 8
    dtype: bfloat16
    tensor_model_parallel_size: 1
    temperature: 1.0
    top_p: 1.0
    do_sample: true
    gpu_memory_utilization: 0.8
    max_num_batched_tokens: 40960
    max_num_seqs: 512
    log_prob_max_token_len_per_gpu: 40960
    enable_chunked_prefill: true
    calculate_log_probs: false
    layered_summon: false
    engine_kwargs:
      vllm:
        max_logprobs: 20
    profiler:
      enable: ${oc.select:actor_rollout_ref.actor.profiler.enable,false}
      all_ranks: ${oc.select:actor_rollout_ref.actor.profiler.all_ranks,false}
      ranks: ${oc.select:actor_rollout_ref.actor.profiler.ranks,[]}

  model:
    enable_activation_offload: true
    enable_gradient_checkpointing: true
    use_remove_padding: false
    use_fused_kernels: false
    fused_kernel_options:
      impl_backend: torch

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  rank_grpo:
    enable: true
    rec_num: ${data.rankgrpo.rec_num}
    rank_separator: ${data.rankgrpo.rank_separator}
    normalize_by_std: true
    year_tolerance: 2
    exclude_seen: true
    importance_sampling_level: token

trainer:
  project_name: RankGRPO
  experiment_name: rankgrpo_vllm
  val_before_train: false
  default_hdfs_dir: null
  logger: [tensorboard]
  remove_previous_ckpt_in_save: true
  save_freq: 20
  test_freq: -1
  total_epochs: 2
  nnodes: 1
  n_gpus_per_node: 8

critic:
  enable: false
  profiler:
    enable: ${oc.select:actor_rollout_ref.actor.profiler.enable,false}
    all_ranks: ${oc.select:actor_rollout_ref.actor.profiler.all_ranks,false}
    ranks: ${oc.select:actor_rollout_ref.actor.profiler.ranks,[]}

global_profiler:
  tool: null
  steps: null
  profile_continuous_steps: false
  save_path: outputs/profile/rankgrpo
  global_tool_config:
    nsys:
      discrete: false
      controller_nsight_options:
        trace: "cuda,nvtx,cublas,ucx"
        cuda-memory-usage: "true"
        cuda-graph-trace: "graph"
      worker_nsight_options:
        trace: "cuda,nvtx,cublas,ucx"
        cuda-memory-usage: "true"
        cuda-graph-trace: "graph"
        capture-range: "cudaProfilerApi"
        capture-range-end: null
        kill: none

ray_init:
  num_cpus: null
  timeline_json_file: null

